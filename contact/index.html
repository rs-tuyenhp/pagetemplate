  <script type="text/javascript">
    $(document).ready(function() {
      $("#exportPDF").click(function(){
        var w = document.getElementById("wrapper_pdf_attributes_analysis").offsetWidth / 2.4;
        var h = document.getElementById("wrapper_pdf_attributes_analysis").offsetHeight / 2.4;
        html2canvas(document.getElementById("wrapper_pdf_attributes_analysis")).then(canvas => {
          var img = canvas.toDataURL("image/jpeg", 1);
          var pdf = new jsPDF('P', 'px', 'a4');
          for (let i = 0; i < pagePDF; i++) {
            pdf.addImage(img, "JPEG", 0, -(625 * i), w, h, undefined, "FAST");
            if (i < (pagePDF - 1)) { pdf.addPage(); }
          }
          $("#loader").removeClass('loader-circle');
          pdf.save(nameFilePdf);
        });
      });
      /* ! Event exportPDF */
    });
  </script>
